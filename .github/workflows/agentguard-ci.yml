name: AgentGuard CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=agentguard --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  threat-model-examples:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AgentGuard
        run: pip install -e .

      - name: Analyze example agents
        run: |
          agentguard analyze --input examples/research_agent.yaml \
                             --output research_report.html
          agentguard analyze --input examples/customer_service_agent.yaml \
                             --output cs_report.html

      - name: Upload example reports
        uses: actions/upload-artifact@v4
        with:
          name: example-threat-reports
          path: "*.html"
